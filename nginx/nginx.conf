events {}
http {
  upstream minio_upstream {
    least_conn;
    server minio:9000 max_fails=3 fail_timeout=30s;
  }
  upstream user_upstream {
    least_conn;
    server user-server-1:8081 max_fails=3 fail_timeout=30s;
    server user-server-2:8081 max_fails=3 fail_timeout=30s;
  }
  upstream chat_upstream {
    least_conn;
    server chat-server-1:8082 max_fails=3 fail_timeout=30s;
    server chat-server-2:8082 max_fails=3 fail_timeout=30s;
  }
  server {
    listen 80;
    server_name user.blind-date.com;
    location /api/v1/users/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://user_upstream;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }
    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://user_upstream;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }
  }
  server {
    listen 80;
    server_name chat.blind-date.com;
    location /api/v1/chats/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://chat_upstream;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }
    location /ws/chat {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_pass http://chat_upstream;
      proxy_read_timeout 60s;
    }
    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://chat_upstream;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }
  }
  server {
    listen 80;
    server_name minio.blind-date.com;
    client_max_body_size 50m;
    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://minio_upstream;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }
  }
}
