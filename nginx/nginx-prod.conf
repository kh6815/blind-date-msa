worker_processes auto;

events {
    worker_connections 1024;
}

http {

    # -----------------------------
    # Docker DNS resolver
    # -----------------------------
    #resolver 127.0.0.11 valid=10s;

    # -----------------------------
    # 기본 설정
    # -----------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # -----------------------------
    # gzip (트래픽 절감)
    # -----------------------------
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # -----------------------------
    # 로그 설정
    # -----------------------------
    log_format main
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'upstream:$upstream_addr '
        'req_time:$request_time '
        'upstream_time:$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # -----------------------------
    # 공통 timeout
    # -----------------------------
    proxy_connect_timeout 2s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # -----------------------------
    # failover 설정
    # -----------------------------
    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    proxy_next_upstream_tries 3;

    # -----------------------------
    # MINIO
    # -----------------------------
    upstream minio_upstream {
        least_conn;
        server minio:9000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # -----------------------------
    # USER SERVICE
    # -----------------------------
    upstream user_upstream {
        least_conn;

        server user-server-1:8081 max_fails=1 fail_timeout=10s;
        server user-server-2:8081 max_fails=1 fail_timeout=10s;

        keepalive 32;
    }

    # -----------------------------
    # CHAT SERVICE
    # -----------------------------
    upstream chat_upstream {
        least_conn;

        server chat-server-1:8082 max_fails=1 fail_timeout=10s;
        server chat-server-2:8082 max_fails=1 fail_timeout=10s;

        keepalive 32;
    }

    # ============================================================
    # USER DOMAIN
    # ============================================================

    server {
        listen 80;
        server_name user.blind-date.site;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name user.blind-date.site;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        location /api/v1/users/ {

            proxy_pass http://user_upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location / {

            proxy_pass http://user_upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }

    # ============================================================
    # CHAT DOMAIN
    # ============================================================

    server {
        listen 80;
        server_name chat.blind-date.site;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name chat.blind-date.site;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        location /api/v1/chats/ {

            proxy_pass http://chat_upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /ws/chat {

            proxy_pass http://chat_upstream;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600;
        }

        location / {

            proxy_pass http://chat_upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }

    # ============================================================
    # MINIO DOMAIN
    # ============================================================

    server {
        listen 80;
        server_name minio.blind-date.site;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name minio.blind-date.site;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        client_max_body_size 50m;

        location / {

            proxy_pass http://minio_upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }

    # ============================================================
    # GRAFANA DOMAIN
    # ============================================================

    server {
        listen 80;
        server_name grafana.blind-date.site;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name grafana.blind-date.site;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        client_max_body_size 50m;

        location / {

            proxy_pass http://grafana:3000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}