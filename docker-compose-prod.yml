x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mysql-user:
    image: mysql:8.0
    container_name: mysql-user
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-blind_date_user}
      MYSQL_USER: ${SPRING_DATASOURCE_USERNAME}
      MYSQL_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-user-data:/var/lib/mysql
    networks:
      - app-net

  mongo-chat:
    image: mongo:7.0
    container_name: mongo-chat
    restart: unless-stopped
    logging: *default-logging
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-blind_date_chat}
    ports:
      - "27017:27017"
    volumes:
      - mongo-chat-data:/data/db
    networks:
      - app-net

  # ── Redis Single Instance ────────────────────────────────────────────────
  redis:
    image: redis:7.2
    container_name: redis
    restart: unless-stopped
    logging: *default-logging
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-net

  # ── Redis Cluster (3 master + 3 replica) - DISABLED ──────────────────────
  # command 복구 전략
  #  ┌─────────────────────────────┬──────────┬──────────────────────────────────────────────┐
  #  │            옵션             │    값    │                     의미                     │
  #  ├─────────────────────────────┼──────────┼──────────────────────────────────────────────┤
  #  │ appendfsync                 │ everysec │ 1초마다 AOF를 디스크에 flush (최대 1초 유실) │
  #  ├─────────────────────────────┼──────────┼──────────────────────────────────────────────┤
  #  │ auto-aof-rewrite-percentage │ 100      │ AOF 파일이 이전 크기의 2배가 되면 rewrite    │
  #  ├─────────────────────────────┼──────────┼──────────────────────────────────────────────┤
  #  │ auto-aof-rewrite-min-size   │ 64mb     │ AOF가 최소 64MB 이상일 때만 rewrite 실행     │
  #  ├─────────────────────────────┼──────────┼──────────────────────────────────────────────┤
  #  │ save 900 1                  │ -        │ 15분 안에 1번 변경 시 RDB 스냅샷 저장        │
  #  ├─────────────────────────────┼──────────┼──────────────────────────────────────────────┤
  #  │ save 300 10                 │ -        │ 5분 안에 10번 변경 시 RDB 스냅샷 저장        │
  #  ├─────────────────────────────┼──────────┼──────────────────────────────────────────────┤
  #  │ save 60 10000               │ -        │ 1분 안에 10000번 변경 시 RDB 스냅샷 저장     │
  #  └─────────────────────────────┴──────────┴──────────────────────────────────────────────┘
  #
  #  복구 시나리오:
  #  - 노드 재시작 → AOF로 최근 데이터 복구 (최대 1초 유실)
  #  - AOF 손상 시 → RDB 스냅샷으로 fallback
