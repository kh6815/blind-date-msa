  # ── Kafka Single Broker ──────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    restart: unless-stopped
    logging: *default-logging
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - app-net
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      # 개인 프로젝트용 - 단일 브로커 설정
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      # 디스크 공간 절약 - 로그 보존 정책 (개인 프로젝트용으로 매우 짧게 설정)
      KAFKA_LOG_RETENTION_HOURS: 6                          # 6시간만 보관 (기본 168시간)
      KAFKA_LOG_RETENTION_BYTES: 524288000                  # 파티션당 500MB로 제한 (기본 -1 무제한)
      KAFKA_LOG_SEGMENT_BYTES: 134217728                    # 세그먼트 크기 128MB (기본 1GB)
      KAFKA_LOG_SEGMENT_MS: 3600000                         # 1시간마다 새 세그먼트 생성
      # 압축 정책 - 디스크 공간 절약
      KAFKA_COMPRESSION_TYPE: lz4                           # lz4 압축 (빠르고 효율적)
      KAFKA_LOG_CLEANUP_POLICY: delete                      # 오래된 로그 삭제 정책
      KAFKA_LOG_CLEANER_ENABLE: 'true'                      # 로그 클리너 활성화
      KAFKA_LOG_CLEANER_DELETE_RETENTION_MS: 3600000        # 삭제 대상 1시간 보관 후 제거
      # __consumer_offsets 토픽 파티션 수 축소 (기본 50 → 10)
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 10                # consumer offsets 파티션 10개
      KAFKA_TRANSACTION_STATE_LOG_NUM_PARTITIONS: 10        # transaction 파티션 10개
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # 기본 파티션 수 축소 (개인 프로젝트용)
      KAFKA_NUM_PARTITIONS: 3                               # 신규 토픽 기본 3개 파티션
      # 자동 토픽 생성 비활성화 (필요한 토픽만 수동 생성하여 공간 절약)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      # 메모리 최적화
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"                  # JVM 힙 메모리 제한
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

