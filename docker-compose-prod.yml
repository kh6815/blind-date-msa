  chat-server-1:
    image: eclipse-temurin:17-jre-alpine
    container_name: chat-server-1
    restart: unless-stopped
    logging: *default-logging
    command: [ "java","-jar","/app/chat-server.jar" ]
    depends_on:
      mongo-chat:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8082"
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI}
      #      SPRING_DATA_REDIS_CLUSTER_NODES: redis-node-1:6379,redis-node-2:6379,redis-node-3:6379,redis-node-4:6379,redis-node-5:6379,redis-node-6:6379
      #      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EXTERNAL_USER_SERVER_URL: ${USER_SERVER_DOMAIN}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET_CHAT}
    volumes:
      - ./chat-server.jar:/app/chat-server.jar
      - ./logs/chat-server-1:/logs
    networks:
      - app-net

