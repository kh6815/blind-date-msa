apiVersion: 1

providers:
  - name: prometheus # A uniquely identifiable name for the provider
    folder: Services # The folder where to place the dashboards
    type: file
    options:
      path:
        # Default path for Windows: C:/Program Files/GrafanaLabs/grafana/public/dashboards
        /etc/grafana/provisioning/dashboards/system
        
  - name: elasticsearch
    folder: Services
    type: file
    options:
      path:
        /etc/grafana/provisioning/dashboards/logs