global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: grafana
    static_configs:
      - targets:
          - grafana:3000

  - job_name: user-server
    metrics_path: /actuator/prometheus
    scrape_interval: 5s
    static_configs:
      - targets:
          - user-server-1:8081
          - user-server-2:8081

  - job_name: chat-server
    metrics_path: /actuator/prometheus
    scrape_interval: 5s
    static_configs:
      - targets:
          - chat-server-1:8082
          - chat-server-2:8082