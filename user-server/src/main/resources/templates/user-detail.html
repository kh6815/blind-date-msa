<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{thymeleaf/layout/custom-header-layout :: layout(~{::header}, ~{::content}, '')}">
<header>
    <a href="/" class="back-btn">
        <i class="fas fa-arrow-left"></i>
    </a>
</header>
<th:block th:fragment="content">
    <div class="content-scrollable">
        <div class="profile-header">
          <div id="image-slider" class="slider-container">
            <!-- Main Profile Image -->
            <img
              th:if="${user.profileImageUrl != null}"
              th:src="${user.profileImageUrl}"
              class="profile-image-full"
              style="display: block"
            />
            <img
              th:unless="${user.profileImageUrl != null}"
              src="https://randomuser.me/api/portraits/lego/1.jpg"
              class="profile-image-full"
              style="display: block"
            />

            <!-- Additional Images -->
            <img
              th:each="img : ${user.imageUrls}"
              th:src="${img}"
              class="profile-image-full"
              style="display: none"
            />

            <button
              type="button"
              id="prevBtn"
              class="slider-btn slider-btn-prev"
            >
              &#8592;
            </button>
            <button
              type="button"
              id="nextBtn"
              class="slider-btn slider-btn-next"
            >
              &#8594;
            </button>
          </div>
          <script>
            document.addEventListener("DOMContentLoaded", function () {
              const images = document.querySelectorAll(
                "#image-slider .profile-image-full",
              );
              let current = 0;
              function show(idx) {
                images.forEach(
                  (img, i) =>
                    (img.style.display = i === idx ? "block" : "none"),
                );
              }
              document.getElementById("prevBtn").onclick = function (e) {
                e.stopPropagation(); // Prevent modal opening
                current = (current - 1 + images.length) % images.length;
                show(current);
              };
              document.getElementById("nextBtn").onclick = function (e) {
                e.stopPropagation(); // Prevent modal opening
                current = (current + 1) % images.length;
                show(current);
              };

              // Modal Logic
              const modal = document.getElementById("imageModal");
              const modalImg = document.getElementById("modalImage");
              const closeBtn =
                document.getElementsByClassName("close-modal")[0];

              images.forEach((img) => {
                img.style.cursor = "zoom-in";
                img.addEventListener("click", function () {
                  modal.style.display = "flex";
                  modalImg.src = this.src;
                });
              });

              closeBtn.onclick = function () {
                modal.style.display = "none";
              };

              modal.onclick = function (e) {
                if (e.target === modal) {
                  modal.style.display = "none";
                }
              };
            });
          </script>
        </div>

        <!-- Profile Info -->
        <div class="profile-info-container">
          <div class="profile-title-row">
            <h1 class="profile-name-large">
              <span th:text="${user.nickname}">Name</span>,
              <span th:text="${user.age}">25</span>
            </h1>
              <div class="tag" th:classappend="${user.isOnline} ? 'tag-online' : 'tag-offline'">
                  <i class="fas fa-circle online-dot"></i>
                  <span th:text="${user.isOnline} ? 'Online' : 'Offline'"></span>
              </div>
          </div>

          <p class="location-text">
            <i class="fas fa-map-marker-alt"></i>
            <span th:text="${user.location}">Location</span>
          </p>

          <div class="info-section">
            <div class="info-label">Job</div>
            <div class="info-value" th:text="${user.job}">Designer</div>
          </div>

          <div class="info-section">
            <div class="info-label">About</div>
            <div class="info-value about-text" th:text="${user.description}">
              Hello! I'm looking for someone to share coffee with.
            </div>
          </div>

          <div class="info-section">
            <div class="info-label">MBTI</div>
            <div class="tag-container">
              <span class="tag" th:text="${user.mbti}">ENFP</span>
            </div>
          </div>

          <div class="info-section">
            <div class="info-label">Interests</div>
            <div class="tag-container">
              <span
                class="tag"
                th:each="interest : ${user.interestList}"
                th:text="${interest}"
                >Travel</span
              >
            </div>
          </div>

          <div class="like-count-row">
            <i class="fas fa-heart" style="color: #e74c3c; font-size: 0.9rem;"></i>
            <span id="likeCountText"
                  th:data-count="${likeCount}"
                  th:text="${likeCount} + '명이 좋아요를 눌렀습니다'"></span>
          </div>

          <div class="action-buttons">
            <a href="/" class="btn-action btn-pass">
              <i class="fas fa-times"></i> Pass
            </a>
            <button type="button"
                    id="likeBtn"
                    class="btn-action"
                    th:classappend="${isLiked} ? 'btn-liked' : 'btn-like'"
                    th:data-target-id="${user.id}"
                    th:data-liked="${isLiked}">
              <i class="fas fa-heart"></i>
              <span id="likeBtnText" th:text="${isLiked} ? 'Liked' : 'Like'"></span>
            </button>
            <a th:href="${@environment.getProperty('external.chat-server.url') + '/chats/room/create?targetUserId=' + user.id}"
              class="btn-action btn-chat"
            >
              <i class="fas fa-comment"></i> Chat
            </a>
          </div>

          <script>
            (function () {
              const likeBtn = document.getElementById('likeBtn');
              const likeBtnText = document.getElementById('likeBtnText');
              const likeCountText = document.getElementById('likeCountText');

              likeBtn.addEventListener('click', function () {
                const targetId = Number(likeBtn.dataset.targetId);
                const isLiked = likeBtn.dataset.liked === 'true';

                function onSuccess() {
                  const nowLiked = !isLiked;
                  likeBtn.dataset.liked = nowLiked;

                  if (nowLiked) {
                    likeBtn.classList.replace('btn-like', 'btn-liked');
                    likeBtnText.textContent = 'Liked';
                  } else {
                    likeBtn.classList.replace('btn-liked', 'btn-like');
                    likeBtnText.textContent = 'Like';
                  }

                  const current = Number(likeCountText.dataset.count);
                  const updated = nowLiked ? current + 1 : current - 1;
                  likeCountText.dataset.count = updated;
                  likeCountText.textContent = updated + '명이 좋아요를 눌렀습니다';
                }

                if (isLiked) {
                  fnApiDelete('/api/v1/likes', true, {}, { targetUserId: targetId }, 'json', onSuccess);
                } else {
                  fnApiPost('/api/v1/likes', true, {}, { targetUserId: targetId }, 'json', onSuccess);
                }
              });
            })();
          </script>
        </div>
        <!-- Image Modal -->
        <div id="imageModal" class="image-modal">
          <span class="close-modal">&times;</span>
          <img class="modal-content" id="modalImage"/>
        </div>
    </div>
</th:block>
