<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{thymeleaf/layout/custom-header-layout :: layout(~{::header}, ~{::content}, '로그인')}">
<header></header>
<th:block th:fragment="content">
    <div class="content-scrollable login-container">
        <div class="logo-large" th:text="${appName}"></div>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>

        <form action="/login" method="post" id="loginForm">
            <div class="form-group">
                <input type="email" name="email" id="emailInput" class="form-control" placeholder="이메일" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" id="passwordInput" class="form-control" placeholder="비밀번호" required>
            </div>
            <button type="submit" class="btn-primary" id="loginButton">로그인</button>
        </form>

        <div class="links">
            <a href="/signup">회원가입하기</a>
        </div>
    </div>

    <script>
        // 쿼리 파라미터에서 email과 password 추출
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const password = urlParams.get('password');

        // email과 password가 모두 존재하면 0.3초 후 자동 로그인
        if (email && password) {
            setTimeout(() => {
                // 입력 폼에 값 채우기
                document.getElementById('emailInput').value = email;
                document.getElementById('passwordInput').value = password;

                // 로그인 버튼 클릭
                document.getElementById('loginButton').click();
            }, 300);
        }
    </script>
</th:block>
