<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>프로필</title>
    <link rel="stylesheet" href="/css/user-v2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <a href="/v2/home">
                    <i class="fas fa-chevron-left" style="color: var(--text-primary); font-size: 1.2rem;"></i>
                </a>
            </div>
            <div class="header-title">내 프로필</div>
            <div class="header-right">
                <a href="/v2/profile/edit">
                    <i class="fas fa-pen" style="color: var(--accent-color); font-size: 1rem;"></i>
                </a>
            </div>
        </header>

        <!-- Profile Content -->
        <div class="content-scrollable">
            <div class="profile-v2-container">
                <!-- Avatar -->
                <div class="profile-avatar-large" 
                     th:style="'background-image: url(' + (${user.profileImageUrl != null ? user.profileImageUrl : 'https://placehold.co/100x100?text=User'}) + ')'">
                </div>
                
                <!-- Name & Age -->
                <div class="profile-name-large">
                    <span th:text="${user.nickname}">닉네임</span>, 
                    <span th:text="${user.age}">25</span>
                </div>
                
                <!-- Status -->
                <div class="user-detail" style="margin-bottom: 20px;">
                    <i class="fas fa-circle" style="color: #4cd137; font-size: 8px; margin-right: 5px;"></i>
                    온라인
                </div>

                <!-- Stats -->
                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value">85%</div>
                        <div class="stat-label">프로필 완성도</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">127</div>
                        <div class="stat-label">조회수</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">34</div>
                        <div class="stat-label">좋아요</div>
                    </div>
                </div>

                <!-- Menu List -->
                <div class="profile-menu">
                    <div class="menu-item" onclick="location.href='/v2/profile/edit'">
                        <div style="display: flex; align-items: center;">
                            <i class="fas fa-user-edit menu-icon"></i>
                            <span>프로필 수정</span>
                        </div>
                        <i class="fas fa-chevron-right" style="color: #555;"></i>
                    </div>
                    <div class="menu-item">
                        <div style="display: flex; align-items: center;">
                            <i class="fas fa-cog menu-icon"></i>
                            <span>설정</span>
                        </div>
                        <i class="fas fa-chevron-right" style="color: #555;"></i>
                    </div>
                    <div class="menu-item">
                        <div style="display: flex; align-items: center;">
                            <i class="fas fa-shield-alt menu-icon"></i>
                            <span>개인정보 보호</span>
                        </div>
                        <i class="fas fa-chevron-right" style="color: #555;"></i>
                    </div>
                    <div class="menu-item" style="color: var(--danger-color);">
                        <div style="display: flex; align-items: center;">
                            <i class="fas fa-sign-out-alt menu-icon" style="color: var(--danger-color);"></i>
                            <span>로그아웃</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="/v2/home" class="nav-item">
                <i class="fas fa-home"></i>
            </a>
            <a th:href="@{'http://localhost:8082/chats?userId=' + ${user.id}}" class="nav-item">
                <i class="fas fa-comment-dots"></i>
            </a>
            <a href="/v2/profile" class="nav-item active">
                <i class="fas fa-user"></i>
            </a>
        </nav>
    </div>
</body>
</html>
