<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{thymeleaf/layout/common-layout :: layout(~{::section}, ${false}, 'like')}">
<section>

  <!-- 빈 상태 -->
  <div th:if="${#lists.isEmpty(likers)}" class="empty-state">
    <i class="fas fa-heart empty-icon" style="color: #555;"></i>
    <p>아직 좋아요를 보낸 사람이 없습니다.</p>
  </div>

  <!-- 좋아요 목록 -->
  <div th:each="liker : ${likers}"
       class="chat-item"
       th:onclick="'location.href=\'/users/' + ${liker.userId} + '\''">
    <div class="avatar"
         th:style="'background-image: url(' + (${liker.profileImageUrl != null ? liker.profileImageUrl : 'https://randomuser.me/api/portraits/lego/1.jpg'}) + ')'">
    </div>
    <div class="chat-info">
      <div class="chat-name">
        <span th:text="${liker.nickname}">닉네임</span>
        <span class="chat-time"
              th:text="${liker.likedAt != null ? #temporals.format(liker.likedAt, 'yyyy-MM-dd HH:mm') : ''}">
        </span>
      </div>
      <div class="chat-preview">
        <i class="fas fa-heart" style="color: #e74c3c; font-size: 0.8rem; margin-right: 4px;"></i>
        <span>회원님의 프로필에 좋아요를 눌렀습니다</span>
      </div>
    </div>
    <!-- 미읽음 빨간 점 -->
    <span th:if="${!liker.isRead}" class="unread-badge">N</span>
  </div>

  <!-- 더 보기 -->
  <div th:if="${hasNext}" class="load-more-container">
    <a th:href="@{'/likes'(page=${nextPage}, size=${size})}" class="btn-load-more">더 보기</a>
  </div>

  <script>
    // 페이지 로드 완료 후 읽음 처리 (후처리 — 렌더링엔 영향 없음)
    document.addEventListener('DOMContentLoaded', function () {
      fnApiPatch('/api/v1/likes/read', true, {}, {}, 'json', function () {
        // 읽음 처리 성공 시 배지 숨김
        // 나중에 페이지 다시 로드 하면 읽음 처리됨
        // document.querySelectorAll('.unread-badge').forEach(function (badge) {
        //   badge.style.display = 'none';
        // });
      });
    });
  </script>

</section>
</html>
