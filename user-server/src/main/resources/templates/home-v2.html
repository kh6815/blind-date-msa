<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>매칭</title>
    <link rel="stylesheet" href="/css/user-v2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <!-- Filter or Menu icon -->
                <i class="fas fa-bars" style="color: var(--text-secondary); font-size: 1.2rem;"></i>
            </div>
            <div class="header-title">GRIZZLY</div>
            <div class="header-right">
                <!-- Search or Notification -->
                <i class="fas fa-bell" style="color: var(--text-secondary); font-size: 1.2rem;"></i>
            </div>
        </header>

        <!-- User List -->
        <div class="content-scrollable">
            <div class="user-list">
                <a th:each="user : ${users}" 
                   th:href="@{'/v2/users/' + ${user.id}}" 
                   class="user-item">
                    <div class="user-avatar" 
                         th:style="'background-image: url(' + (${user.profileImageUrl != null ? user.profileImageUrl : 'https://placehold.co/100x100?text=User'}) + ')'">
                    </div>
                    <div class="user-info">
                        <div class="user-name">
                            <span th:text="${user.nickname}">닉네임</span>, 
                            <span th:text="${user.age}">25</span>
                            <span th:if="${user.gender == 'MALE'}"><i class="fas fa-mars" style="color: #6c5ce7; margin-left: 5px;"></i></span>
                            <span th:if="${user.gender == 'FEMALE'}"><i class="fas fa-venus" style="color: #ff7675; margin-left: 5px;"></i></span>
                        </div>
                        <div class="user-detail">
                            <i class="fas fa-map-marker-alt" style="margin-right: 5px;"></i>
                            <span th:text="${user.location != null ? user.location : '알 수 없음'}">서울</span>
                            <span th:if="${user.distance != null}" th:text="' · ' + ${#numbers.formatDecimal(user.distance, 1, 1)} + 'km'"> · 1.2km</span>
                        </div>
                    </div>
                    <div class="user-status"></div>
                </a>
            </div>
            
            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(users)}" style="text-align: center; padding: 50px 20px; color: var(--text-secondary);">
                <i class="far fa-sad-tear" style="font-size: 3rem; margin-bottom: 20px;"></i>
                <p>표시할 회원이 없습니다.</p>
            </div>
            
             <!-- Load More Button -->
            <div th:if="${hasNext}" style="text-align: center; padding: 20px;">
                <a th:href="@{'/v2/home'(page=${nextPage})}" 
                   style="color: var(--accent-color); text-decoration: none; font-size: 14px; font-weight: 600;">
                   더 보기
                </a>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="/v2/home" class="nav-item active">
                <i class="fas fa-home"></i>
            </a>
            <a th:href="@{'http://localhost:8082/chats?userId=' + ${currentUser.id}}" class="nav-item">
                <i class="fas fa-comment-dots"></i>
            </a>
            <a href="/v2/profile" class="nav-item">
                <i class="fas fa-user"></i>
            </a>
        </nav>
    </div>
</body>
</html>
