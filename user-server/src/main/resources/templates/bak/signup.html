<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRIZZLY - Sign Up</title>
    <link rel="stylesheet" href="/css/bak/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="content-scrollable signup-container">
        <div class="header-title">회원가입</div>

        <form action="/signup" method="post" th:object="${userRegisterRequest}">
          <div class="form-group">
            <label class="form-label">이메일</label>
            <input
              type="email"
              th:field="*{email}"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호</label>
            <input
              type="password"
              th:field="*{password}"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">닉네임</label>
            <input
              type="text"
              th:field="*{nickname}"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">성별</label>
            <select th:field="*{gender}" class="form-control">
              <option value="MALE">남성</option>
              <option value="FEMALE">여성</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">생년월일</label>
            <input
              type="date"
              th:field="*{birthDate}"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">직업</label>
            <input type="text" th:field="*{job}" class="form-control" />
          </div>
          <div class="form-group">
            <label class="form-label">MBTI</label>
            <input
              type="text"
              th:field="*{mbti}"
              class="form-control"
              placeholder="예: INTJ"
            />
          </div>
          <div class="form-group">
            <label class="form-label">관심사 (쉼표로 구분)</label>
            <input
              type="text"
              th:field="*{interests}"
              class="form-control"
              placeholder="운동, 여행, 영화"
            />
          </div>
          <div class="form-group">
            <label class="form-label">자기소개</label>
            <textarea
              th:field="*{description}"
              class="form-control"
              rows="3"
            ></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">위치</label>
            <input
              type="text"
              th:field="*{location}"
              class="form-control"
              placeholder="서울 강남구"
            />
          </div>

          <button type="submit" class="btn-primary">가입하기</button>
        </form>

        <div class="links">
          <a href="/login">이미 계정이 있으신가요?</a>
        </div>
      </div>
    </div>
  </body>
</html>
