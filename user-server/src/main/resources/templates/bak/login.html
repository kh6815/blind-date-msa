<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRIZZLY - Login</title>
    <link rel="stylesheet" href="/css/bak/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="content-scrollable login-container">
        <div class="logo-large">GRIZZLY</div>
        
        <div th:if="${error}" class="error-message" th:text="${error}"></div>

        <form action="/login" method="post">
            <div class="form-group">
                <input type="email" name="email" class="form-control" placeholder="이메일" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" class="form-control" placeholder="비밀번호" required>
            </div>
            <button type="submit" class="btn-primary">로그인</button>
        </form>

        <div class="links">
            <a href="/signup">회원가입하기</a>
        </div>
    </div>
</body>
</html>
