<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRIZZLY - Match</title>
    <link rel="stylesheet" href="/css/bak/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">GRIZZLY</div>
        <div
          class="filters"
          onclick="
            document.getElementById('filterModal').style.display = 'flex'
          "
        >
          <i class="fas fa-sliders-h"></i>
        </div>
      </header>

      <div class="content-scrollable">
        <div class="profile-grid" id="profileGrid">
          <th:block th:fragment="userItems">
            <div
              th:each="user : ${users}"
              class="profile-card-home"
              th:onclick="'location.href=\'/users/' + ${user.id} + '\''"
            >
              <div
                class="profile-image-home"
                th:style="'background-image: url(' + (${user.profileImageUrl != null ? user.profileImageUrl : 'https://randomuser.me/api/portraits/lego/1.jpg'}) + ')'"
              ></div>

              <div class="status-badge">
                <div class="status-dot"></div>
                온라인
              </div>

              <div class="distance-badge" th:if="${user.distance != null}">
                <i class="fas fa-map-marker-alt"></i>
                <span
                  th:text="${#numbers.formatDecimal(user.distance, 1, 1)} + 'km'"
                  >1.2km</span
                >
              </div>

              <div class="profile-overlay">
                <div class="profile-name">
                  <span th:text="${user.nickname}">닉네임</span>,
                  <span th:text="${user.age}">25</span>세
                </div>
                <div class="profile-details">
                  <i class="fas fa-briefcase"></i>
                  <span th:text="${user.job}">직업</span>
                </div>
              </div>
            </div>
          </th:block>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="loading-indicator">
          <i class="fas fa-spinner fa-spin loading-spinner"></i>
        </div>

        <!-- Sentinel for Intersection Observer -->
        <div id="sentinel" class="sentinel"></div>
      </div>

      <!-- Filter Modal -->
      <div
        id="filterModal"
        class="filter-modal"
        onclick="if (event.target === this) this.style.display = 'none';"
      >
        <div class="filter-content">
          <h2 style="color: white; margin-bottom: 20px">필터</h2>
          <form action="/" method="get">
            <div class="form-group">
              <label class="form-label">나이</label>
              <div class="range-inputs">
                <input
                  type="number"
                  name="minAge"
                  class="filter-input"
                  placeholder="최소"
                  th:value="${param.minAge}"
                />
                <input
                  type="number"
                  name="maxAge"
                  class="filter-input"
                  placeholder="최대"
                  th:value="${param.maxAge}"
                />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">성별</label>
              <select name="gender" class="filter-input">
                <option value="">전체</option>
                <option
                  value="MALE"
                  th:selected="${param.gender != null && param.gender[0] == 'MALE'}"
                >
                  남성
                </option>
                <option
                  value="FEMALE"
                  th:selected="${param.gender != null && param.gender[0] == 'FEMALE'}"
                >
                  여성
                </option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">MBTI</label>
              <input
                type="text"
                name="mbti"
                class="filter-input"
                placeholder="예: INTJ"
                th:value="${param.mbti}"
              />
            </div>
            <div class="form-group">
              <label class="form-label">지역</label>
              <input
                type="text"
                name="location"
                class="filter-input"
                placeholder="예: 서울"
                th:value="${param.location}"
              />
            </div>
            <button type="submit" class="btn-apply">필터 적용하기</button>
          </form>
        </div>
      </div>

      <nav class="bottom-nav">
        <a href="/" class="nav-item active">
          <i class="fas fa-home"></i>
        </a>
        <a
          th:href="@{'http://localhost:8082/chats?userId=' + ${currentUser.id}}"
          class="nav-item"
        >
          <i class="fas fa-comment-alt"></i>
        </a>
        <a href="#" class="nav-item"><i class="fas fa-heart"></i></a>
        <a href="/profile" class="nav-item">
          <i class="fas fa-user"></i>
        </a>
      </nav>
    </div>

    <script th:inline="javascript">
      /*<![CDATA[*/
      let page = /*[[${nextPage}]]*/ 1;
      let hasNext = /*[[${hasNext}]]*/ false;
      let isLoading = false;
      const size = /*[[${size}]]*/ 20;

      const loadingIndicator = document.getElementById("loading");
      const sentinel = document.getElementById("sentinel");
      const profileGrid = document.getElementById("profileGrid");

      const observer = new IntersectionObserver(
        (entries) => {
          // If element is visible and we have more pages and not currently loading
          if (entries[0].isIntersecting && hasNext && !isLoading) {
            loadMoreUsers();
          }
        },
        {
          root: null, // viewport
          rootMargin: "0px",
          threshold: 0.1,
        },
      );

      if (hasNext) {
        observer.observe(sentinel);
      }

      function loadMoreUsers() {
        if (isLoading || !hasNext) return;

        isLoading = true;
        loadingIndicator.style.display = "block";

        const params = new URLSearchParams(window.location.search);
        params.set("page", page);
        params.set("size", size);

        fetch("/users/list?" + params.toString())
          .then((response) => {
            if (!response.ok) throw new Error("Network response was not ok");
            return response.text();
          })
          .then((html) => {
            // Check if HTML is empty or whitespace
            if (!html || html.trim().length === 0) {
              hasNext = false;
              observer.unobserve(sentinel);
              return;
            }

            const tempDiv = document.createElement("div");
            tempDiv.innerHTML = html;

            const newItems = Array.from(tempDiv.children);
            if (newItems.length === 0) {
              hasNext = false;
              observer.unobserve(sentinel);
            } else {
              newItems.forEach((item) => {
                profileGrid.appendChild(item);
              });
              page++;

              // If we got fewer items than requested size, it's likely the last page
              // But let's trust the empty check on next scroll or if 0 items returned.
              // Actually, if newItems.length < size, we can stop.
              // But since we filter out current user in controller,
              // the count might be size - 1. So it's safer to keep going until empty.
            }
          })
          .catch((error) => {
            console.error("Error fetching users:", error);
          })
          .finally(() => {
            isLoading = false;
            loadingIndicator.style.display = "none";
          });
      }
      /*]]>*/
    </script>
  </body>
</html>
