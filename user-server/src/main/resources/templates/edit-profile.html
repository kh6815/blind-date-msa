<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRIZZLY - Edit Profile</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="content-scrollable signup-container">
        <a href="/profile" class="back-btn"
          ><i class="fas fa-arrow-left"></i
        ></a>
        <div class="header-title">프로필 수정</div>

        <form
          action="/profile/edit"
          method="post"
          enctype="multipart/form-data"
        >
          <div class="form-group">
            <label class="form-label">프로필 사진 (대표)</label>
            <div class="preview-image-container">
              <img
                id="mainImagePreview"
                th:src="${user.profileImageUrl != null ? user.profileImageUrl : 'https://randomuser.me/api/portraits/lego/1.jpg'}"
                class="main-preview-image"
              />
            </div>
            <input
              type="file"
              name="profileImageFile"
              class="form-control"
              accept="image/*"
              onchange="previewMainImage(event)"
            />
          </div>
          <script>
            function previewMainImage(event) {
              const file = event.target.files[0];
              if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                  document.getElementById("mainImagePreview").src =
                    e.target.result;
                };
                reader.readAsDataURL(file);
              }
            }
          </script>
          <div class="form-group">
            <label class="form-label">추가 이미지 (최대 5장)</label>
            <!-- Existing Additional Images -->
            <div
              id="existingImagesContainer"
              class="existing-images-container"
              th:if="${not #lists.isEmpty(user.imageUrls)}"
            >
              <div
                th:each="img : ${user.imageUrls}"
                class="existing-image-wrapper"
              >
                <img th:src="${img}" class="existing-image" />
                <button
                  type="button"
                  th:data-image-url="${img}"
                  onclick="deleteExistingImage(this)"
                  class="delete-image-btn"
                >
                  <i class="fas fa-times"></i>
                </button>
              </div>
            </div>
            <!-- Container for deleted images -->
            <div id="deletedImagesInputs"></div>

            <script>
              function deleteExistingImage(btn) {
                const imageUrl = btn.getAttribute("data-image-url");
                // Hide the image container
                btn.parentElement.style.display = "none";

                // Add hidden input
                const container = document.getElementById(
                  "deletedImagesInputs",
                );
                const input = document.createElement("input");
                input.type = "hidden";
                input.name = "deletedImages";
                input.value = imageUrl;
                container.appendChild(input);
              }
            </script>
            <input
              type="file"
              name="profileImageFiles"
              class="form-control"
              accept="image/*"
              multiple
              onchange="previewImages(event)"
            />
            <div id="imagePreview" class="new-image-preview"></div>
          </div>
          <script>
            function previewImages(event) {
              const files = event.target.files;
              const preview = document.getElementById("imagePreview");
              preview.innerHTML = "";
              Array.from(files).forEach((file) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                  const img = document.createElement("img");
                  img.src = e.target.result;
                  img.className = "preview-thumb";
                  preview.appendChild(img);
                };
                reader.readAsDataURL(file);
              });
            }
          </script>
          <div class="form-group">
            <label class="form-label">닉네임</label>
            <input
              type="text"
              name="nickname"
              class="form-control"
              th:value="${user.nickname}"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">직업</label>
            <input
              type="text"
              name="job"
              class="form-control"
              th:value="${user.job}"
            />
          </div>
          <div class="form-group">
            <label class="form-label">MBTI</label>
            <input
              type="text"
              name="mbti"
              class="form-control"
              th:value="${user.mbti}"
              placeholder="예: INTJ"
            />
          </div>
          <div class="form-group">
            <label class="form-label">관심사 (쉼표로 구분)</label>
            <input
              type="text"
              name="interests"
              class="form-control"
              th:value="${user.interests}"
              placeholder="운동, 여행, 영화"
            />
          </div>
          <div class="form-group">
            <label class="form-label">자기소개</label>
            <textarea
              name="description"
              class="form-control"
              rows="3"
              th:text="${user.description}"
            ></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">위치</label>
            <input
              type="text"
              name="location"
              class="form-control"
              th:value="${user.location}"
              placeholder="서울 강남구"
            />
          </div>

          <button type="submit" class="btn-primary">저장하기</button>
        </form>
      </div>
    </div>
  </body>
</html>
