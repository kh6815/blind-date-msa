<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로그인</title>
    <link rel="stylesheet" href="/css/user-v2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="content-scrollable" style="display: flex; flex-direction: column; justify-content: center; padding: 40px;">
            <div class="logo-large">GRIZZLY</div>
            
            <div th:if="${error}" style="color: var(--danger-color); text-align: center; margin-bottom: 20px;" th:text="${error}">
                로그인 에러 메시지
            </div>

            <form action="/login" method="post">
                <input type="hidden" name="version" value="v2">
                
                <div class="form-group">
                    <label class="form-label">이메일</label>
                    <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">비밀번호</label>
                    <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
                </div>
                
                <button type="submit" class="btn-primary">로그인</button>
            </form>

            <div class="auth-links">
                <a href="/v2/signup">계정이 없으신가요? 회원가입</a>
            </div>
        </div>
    </div>
</body>
</html>
