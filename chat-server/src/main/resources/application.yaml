management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

server:
  port: 8082
  forward-headers-strategy: framework

spring:
  application:
    name: chat-server

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}

    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

chat:
  kafka:
    topics:
      message: chat-message

mongock:
  migration-scan-package: com.project.blinddate.chat.migration

logging:
  config: classpath:logback.xml
  level:
    org.springframework.web: info

minio:
  endpoint: ${MINIO_ENDPOINT}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET}

web:
  cookie:
    domain: ${COOKIE_DOMAIN}

external:
  user-server:
    url: ${EXTERNAL_USER_SERVER_URL}

user:
  presence:
    key-prefix: "user:presence:"
