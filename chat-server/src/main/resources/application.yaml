server:
  port: 8082

spring:
  application:
    name: chat-server

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/blind_date_chat}

    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

chat:
  kafka:
    topics:
      message: chat-message
      user-activity: user-activity

mongock:
  migration-scan-package: com.project.blinddate.chat.migration

logging:
  level:
    org.springframework.web: info

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:}
  secret-key: ${MINIO_SECRET_KEY:}
  bucket: ${MINIO_BUCKET:blind-date-chat}

external:
  user-server:
    url: ${EXTERNAL_USER_SERVER_URL:http://localhost:8081}

user:
  presence:
    key-prefix: "user:presence:"
