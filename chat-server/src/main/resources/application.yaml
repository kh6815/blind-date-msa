management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

server:
  port: 8082
  forward-headers-strategy: framework

app:
  #  display-name: GRIZZLY
  display-name: BLIND-DATE

spring:
  application:
    name: chat-server
#  jackson:
#    time-zone: Asia/Seoul  # JSON 직렬화 시 타임존

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}

    redis:
      # Single Redis instance
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      # Redis Cluster (disabled)
#      cluster:
#        nodes: localhost:6379
#        max-redirects: 3

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    producer:
      acks: all

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

chat:
  kafka:
    topics:
#      message: chat-message

mongock:
  migration-scan-package: com.project.blinddate.chat.migration

logging:
  config: classpath:logback.xml
  level:
    org.springframework.web: info

minio:
  endpoint: ${MINIO_ENDPOINT}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET}

web:
  cookie:
    domain: ${COOKIE_DOMAIN}

external:
  user-server:
    url: ${EXTERNAL_USER_SERVER_URL}

user:
  auth:
    key-prefix: "user:token:"
    ttl-minutes: 1440  # 24시간 (24 * 60)
  presence:
    key-prefix: "user:presence:"
    ttl-minutes: 30  # 30분
  info:
    cache-prefix: "user:info:"
    cache-ttl-hours: 24  # 24시간

chatroom:
  metadata:
    key-prefix: "chatroom:"
    key-suffix: ":metadata"
    cache-ttl-hours: 24  # 24시간
