<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>채팅방</title>
    <link rel="stylesheet" href="/css/chat-v2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Chat Room Header -->
        <header class="chat-room-header">
            <a href="/chats" class="back-btn">
                <i class="fas fa-chevron-left"></i>
            </a>
            <a th:href="@{'http://localhost:8081/users/' + ${targetUserId}}" class="header-profile">
                <div class="header-avatar avatar" 
                     th:style="'background-image: url(' + (${targetUserImageUrl != null ? targetUserImageUrl : 'https://placehold.co/100x100?text=User'}) + ')'">
                </div>
                <div class="header-info">
                    <div class="header-nickname" th:text="${targetUserNickname}">상대방</div>
                    <div class="online-status" th:style="${isTargetUserOnline} ? 'color: #4cd137;' : 'color: #adb5bd;'">
                        <span class="online-dot" th:style="${isTargetUserOnline} ? 'background-color: #4cd137;' : 'background-color: #adb5bd;'"></span>
                        <span th:text="${isTargetUserOnline} ? '온라인' : '오프라인'">오프라인</span>
                    </div>
                </div>
            </a>
            <button class="btn-icon" style="color: #adb5bd;">
                <i class="fas fa-ellipsis-v"></i>
            </button>
        </header>

        <!-- Messages Area -->
        <div class="messages-area" id="messagesArea">
            <!-- Messages will be loaded here -->
        </div>

        <!-- Chat Input Area -->
        <div class="chat-input-area">
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <button class="btn-icon" id="uploadBtn">
                <i class="fas fa-plus"></i>
            </button>
            <input type="text" class="chat-input" id="messageInput" placeholder="메시지 입력..." autocomplete="off">
            <button class="btn-icon" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="imageModal" class="image-modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script th:inline="javascript">
        const roomId = /*[[${roomId}]]*/ "room1";
        const userId = /*[[${userId}]]*/ 1;
        let stompClient = null;
        let lastDateKey = null;

        async function loadHistory() {
            try {
                const res = await fetch(`/api/v1/chats/rooms/${roomId}/messages?page=0&size=50`);
                const body = await res.json();
                if (!body.data) return;
                // Reverse to show oldest first if needed, but flex-direction is column
                // Assuming API returns newest first, we might need to reverse or prepend
                // Typically chat history API returns newest first (descending).
                // Let's reverse to append in chronological order
                const messages = body.data.slice().reverse(); 
                messages.forEach(showMessage);
                scrollToBottom();
            } catch (e) {
                console.error("History load error", e);
            }
        }

        function connect() {
            const socket = new SockJS("/ws/chat");
            stompClient = Stomp.over(socket);
            stompClient.debug = null; 

            stompClient.connect({}, function (frame) {
                console.log("Connected: " + frame);
                stompClient.subscribe("/topic/chats/" + roomId, function (message) {
                    showMessage(JSON.parse(message.body));
                    scrollToBottom();
                });
            }, function (error) {
                console.error("Connection error:", error);
            });
        }

        function sendMessage() {
            const input = document.getElementById("messageInput");
            const content = input.value.trim();

            if (!content || !stompClient) return;

            const message = {
                sender_user_id: userId,
                content: content
            };

            stompClient.send("/pub/chats/" + roomId, {}, JSON.stringify(message));
            input.value = "";
        }

        function showMessage(message) {
            const messagesArea = document.getElementById("messagesArea");
            const sentDate = message.sent_at ? new Date(message.sent_at) : new Date();
            const dateKey = sentDate.toISOString().slice(0, 10);
            
            // Date separator logic
            // Note: Since we load history (old -> new) and receive new messages, 
            // simple check against lastDateKey works.
            if (lastDateKey !== dateKey) {
                const dateDiv = document.createElement("div");
                dateDiv.className = "date-separator";
                const dateSpan = document.createElement("span");
                dateSpan.textContent = sentDate.toLocaleDateString("ko-KR", {
                    year: "numeric", month: "long", day: "numeric", weekday: "short"
                });
                dateDiv.appendChild(dateSpan);
                messagesArea.appendChild(dateDiv);
                lastDateKey = dateKey;
            }

            const messageWrapper = document.createElement("div");
            const isMe = message.sender_user_id === userId;
            messageWrapper.className = isMe ? "message-wrapper me" : "message-wrapper other";

            const bubble = document.createElement("div");
            bubble.className = "message-bubble";

            if (message.type === "IMAGE" || (message.content && message.content.startsWith("data:image"))) {
                const img = document.createElement("img");
                let src = message.content;
                // Fix for local docker minio access
                if (src && src.includes("http://minio:9000")) {
                    src = src.replace("http://minio:9000", "http://localhost:9000");
                }
                img.src = src;
                img.style.maxWidth = "100%";
                img.style.borderRadius = "8px";
                img.style.cursor = "zoom-in";
                img.onclick = function() {
                    openModal(this.src);
                };
                bubble.appendChild(img);
                bubble.style.padding = "4px"; // Reduce padding for images
                bubble.style.backgroundColor = "transparent"; // Remove background for images
                bubble.style.boxShadow = "none";
            } else {
                bubble.textContent = message.content;
            }

            const timeDiv = document.createElement("div");
            timeDiv.className = "message-time";
            timeDiv.textContent = sentDate.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

            messageWrapper.appendChild(bubble);
            messageWrapper.appendChild(timeDiv);
            messagesArea.appendChild(messageWrapper);
        }

        function scrollToBottom() {
            const messagesArea = document.getElementById("messagesArea");
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Event Listeners
        document.getElementById("messageInput").addEventListener("keypress", function (e) {
            if (e.key === "Enter") sendMessage();
        });

        document.getElementById("uploadBtn").addEventListener("click", () => {
            document.getElementById("fileInput").click();
        });

        document.getElementById("fileInput").addEventListener("change", async (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append("file", file);

            try {
                // Use Authorization header for upload if needed, 
                // but cookies should handle it if backend supports it.
                const res = await fetch("/chats/image/upload", {
                    method: "POST",
                    body: formData
                });

                if (res.ok) {
                    const data = await res.json();
                    if (stompClient) {
                        const message = {
                            sender_user_id: userId,
                            content: data.url,
                            type: "IMAGE"
                        };
                        stompClient.send("/pub/chats/" + roomId, {}, JSON.stringify(message));
                    }
                } else {
                    alert("이미지 업로드 실패");
                }
            } catch (error) {
                console.error("Upload error:", error);
            }
            e.target.value = "";
        });

        // Modal Logic
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImage");
        const closeBtn = document.getElementsByClassName("close-modal")[0];

        function openModal(src) {
            modal.style.display = "flex";
            modalImg.src = src;
        }

        if (closeBtn) {
            closeBtn.onclick = () => { modal.style.display = "none"; };
        }
        
        modal.onclick = (e) => {
            if (e.target === modal) modal.style.display = "none";
        };

        // Initialize
        loadHistory().then(connect);
    </script>
</body>
</html>
