<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>채팅</title>
    <link rel="stylesheet" href="/css/chat-v2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-title">채팅</div>
            <div>
                <!-- Right icons if needed -->
            </div>
        </header>

        <!-- Chat List -->
        <div class="chat-list">
            <div th:if="${#lists.isEmpty(rooms)}" class="empty-state">
                <i class="far fa-comments empty-icon"></i>
                <p>아직 대화 중인 상대가 없어요.</p>
                <a href="http://localhost:8081/" class="btn-primary">새로운 인연 찾기</a>
            </div>

            <a th:each="room : ${rooms}" 
               th:href="@{'/chats/room/' + ${room.id}}" 
               class="chat-item">
                <div class="avatar" 
                     th:style="'background-image: url(' + (${room.targetUserImageUrl != null ? room.targetUserImageUrl : 'https://placehold.co/100x100?text=User'}) + ')'">
                </div>
                <div class="chat-info">
                    <div class="chat-top">
                        <span class="chat-name" th:text="${room.targetUserNickname}">상대방</span>
                        <span class="chat-time" 
                              th:text="${room.lastMessageAt != null ? #temporals.format(room.lastMessageAt, 'HH:mm') : ''}">
                              12:30
                        </span>
                    </div>
                    <div class="chat-preview" th:text="${room.lastMessagePreview}">
                        메시지 내용이 여기에 표시됩니다...
                    </div>
                </div>
            </a>
            
            <!-- Load More Button -->
            <div th:if="${hasNext}" style="text-align: center; padding: 20px;">
                <a th:href="@{'/chats'(page=${nextPage})}" 
                   style="color: var(--primary-color); text-decoration: none; font-size: 14px; font-weight: 600;">
                   더 보기
                </a>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="http://localhost:8081/" class="nav-item">
                <i class="fas fa-home"></i>
            </a>
            <a href="/chats" class="nav-item active">
                <i class="fas fa-comment-dots"></i>
            </a>
            <a href="http://localhost:8081/profile" class="nav-item">
                <i class="fas fa-user"></i>
            </a>
        </nav>
    </div>
</body>
</html>
