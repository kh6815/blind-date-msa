<!DOCTYPE html>
<html>
<head>
    <title>Blind Date Chat Test</title>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { display: flex; gap: 20px; }
        .box { border: 1px solid #ccc; padding: 20px; width: 45%; }
        #messages { height: 300px; overflow-y: scroll; border: 1px solid #eee; margin-bottom: 10px; padding: 10px; }
        .message { margin-bottom: 5px; padding: 5px; border-radius: 5px; }
        .my-message { background-color: #e3f2fd; text-align: right; }
        .other-message { background-color: #f5f5f5; }
    </style>
</head>
<body>
    <h2>Chat Test Client</h2>
    <div class="container">
        <div class="box">
            <h3>Connection Settings</h3>
            <div>
                <label>Server URL:</label>
                <input type="text" id="serverUrl" value="http://localhost:8082/ws/chat">
            </div>
            <div style="margin-top: 10px;">
                <label>User ID:</label>
                <input type="number" id="userId" value="1">
            </div>
            <div style="margin-top: 10px;">
                <label>Room ID:</label>
                <input type="text" id="roomId" value="room1">
            </div>
            <div style="margin-top: 10px;">
                <button onclick="connect()">Connect</button>
                <button onclick="disconnect()" disabled id="disconnectBtn">Disconnect</button>
            </div>
        </div>
        
        <div class="box">
            <h3>Chat Room: <span id="displayRoomId">-</span></h3>
            <div id="messages"></div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="messageInput" placeholder="Type a message..." style="flex-grow: 1;" onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" id="sendBtn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script>
        let stompClient = null;
        let currentUserId = null;
        let currentRoomId = null;

        function connect() {
            const serverUrl = document.getElementById('serverUrl').value;
            currentUserId = parseInt(document.getElementById('userId').value);
            currentRoomId = document.getElementById('roomId').value;

            const socket = new SockJS(serverUrl);
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function (frame) {
                console.log('Connected: ' + frame);
                document.getElementById('disconnectBtn').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('displayRoomId').textContent = currentRoomId;

                stompClient.subscribe('/topic/chats/' + currentRoomId, function (message) {
                    showMessage(JSON.parse(message.body));
                });
            }, function (error) {
                console.error('Connection error:', error);
                alert('Connection error: ' + error);
            });
        }

        function disconnect() {
            if (stompClient !== null) {
                stompClient.disconnect();
            }
            document.getElementById('disconnectBtn').disabled = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('displayRoomId').textContent = "-";
            console.log("Disconnected");
        }

        function sendMessage() {
            const content = document.getElementById('messageInput').value;
            if (!content || !stompClient) return;

            const message = {
                sender_user_id: currentUserId,
                content: content
            };

            stompClient.send("/pub/chats/" + currentRoomId, {}, JSON.stringify(message));
            document.getElementById('messageInput').value = '';
        }

        function showMessage(message) {
            const messagesDiv = document.getElementById('messages');
            const messageElement = document.createElement('div');
            
            const isMe = message.sender_user_id === currentUserId;
            messageElement.className = 'message ' + (isMe ? 'my-message' : 'other-message');
            
            const time = new Date(message.sent_at).toLocaleTimeString();
            messageElement.innerHTML = `
                <strong>${isMe ? 'Me' : 'User ' + message.sender_user_id}</strong>
                <span style="font-size: 0.8em; color: #666;">${time}</span>
                <div>${message.content}</div>
            `;
            
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
