services:
  mysql-user:
    image: mysql:8.0
    container_name: mysql-user
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-blind_date_user}
      MYSQL_USER: ${SPRING_DATASOURCE_USERNAME}
      MYSQL_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-user-data:/var/lib/mysql
    networks:
      - app-net

  mongo-chat:
    image: mongo:7.0
    container_name: mongo-chat
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-blind_date_chat}
    ports:
      - "27017:27017"
    volumes:
      - mongo-chat-data:/data/db
    networks:
      - app-net

  redis:
    image: redis:7.2
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - app-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    networks:
      - app-net
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - app-net

  user-server-1:
    build:
      context: .
      dockerfile: user-server/Dockerfile
    container_name: user-server-1
    restart: unless-stopped
    depends_on:
      - mysql-user
      - redis
      - kafka
      - minio
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8081"
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      EXTERNAL_CHAT_SERVER_URL: ${CHAT_SERVER_DOMAIN}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET_USER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8081/api/v1/users/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - app-net

  user-server-2:
    build:
      context: .
      dockerfile: user-server/Dockerfile
    container_name: user-server-2
    restart: unless-stopped
    depends_on:
      - mysql-user
      - redis
      - kafka
      - minio
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8081"
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      EXTERNAL_CHAT_SERVER_URL: ${CHAT_SERVER_DOMAIN}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET_USER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8081/api/v1/users/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - app-net

  chat-server-1:
    build:
      context: .
      dockerfile: chat-server/Dockerfile
    container_name: chat-server-1
    restart: unless-stopped
    depends_on:
      - mongo-chat
      - redis
      - kafka
      - minio
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8082"
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      EXTERNAL_USER_SERVER_URL: ${USER_SERVER_DOMAIN}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET_CHAT}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8082/api/v1/chats/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - app-net

  chat-server-2:
    build:
      context: .
      dockerfile: chat-server/Dockerfile
    container_name: chat-server-2
    restart: unless-stopped
    depends_on:
      - mongo-chat
      - redis
      - kafka
      - minio
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8082"
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      EXTERNAL_USER_SERVER_URL: ${USER_SERVER_DOMAIN}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET_CHAT}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8082/api/v1/chats/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - app-net

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    depends_on:
      - user-server-1
      - user-server-2
      - chat-server-1
      - chat-server-2
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    # healthcheck:
      # test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health || exit 1"]
      # interval: 10s
      # timeout: 3s
      # retries: 5
      # start_period: 5s
    networks:
      app-net:
        aliases:
          - user.blind-date.com
          - chat.blind-date.com
          - minio.blind-date.com

volumes:
  mysql-user-data:
  mongo-chat-data:
  redis-data:
  minio-data:

networks:
  app-net:
    name: blind-date-app-net
    driver: bridge


