    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8082"
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI}
      SPRING_DATA_REDIS_HOST: redis
