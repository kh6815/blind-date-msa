      EXTERNAL_USER_SERVER_URL: ${USER_SERVER_DOMAIN}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET_CHAT}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8082/api/v1/chats/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    volumes:
      - ./logs/chat-server-2:/app/logs
    networks:
