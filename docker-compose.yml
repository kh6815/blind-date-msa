#    restart: unless-stopped
#    depends_on:
#      - zookeeper
#    networks:
#      - app-net
#    environment:
#      KAFKA_BROKER_ID: 3
#      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
#      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
#      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092
#      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
#      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
#      KAFKA_MIN_INSYNC_REPLICAS: 2
#    healthcheck:
#      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
#      interval: 10s
#      timeout: 5s
#      retries: 10
#      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - app-net

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    depends_on:
      - user-server-1
      - user-server-2
      - chat-server-1
      - chat-server-2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert:/etc/nginx/ssl:ro
    restart: unless-stopped
      # healthcheck:
      # test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health || exit 1"]
      # interval: 10s
    # timeout: 3s
    # retries: 5
    # start_period: 5s
    networks:
      app-net:
        aliases:
          - user.blind-date.com
          - chat.blind-date.com
          - minio.blind-date.com

  # Prometheus (л©”нҠёлҰӯ мҲҳм§‘кё°)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/data:/prometheus
    restart: unless-stopped
    networks:
      - app-net

  # alloy лЎңк·ё мҲҳм§‘кё°
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    volumes:
      - ./monitoring/alloy/config/config.alloy:/etc/alloy/config.alloy
      - ./logs:/var/log/app
      - ./monitoring/alloy/data:/var/lib/alloy/data
    command: run /etc/alloy/config.alloy
    depends_on:
      - loki
    networks:
      - app-net
    restart: unless-stopped

  loki:
    image: grafana/loki:3.5.1
    container_name: loki
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./monitoring/loki/config:/etc/loki
      - ./monitoring/loki/data:/loki
    networks:
      - app-net
    restart: unless-stopped

  # Grafana (лӘЁлӢҲн„°л§Ғ лҢҖмӢңліҙл“ң)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - ./monitoring/grafana/data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    ports:
      - "4000:3000"
#    environment:
#      - GF_SERVER_ROOT_URL=http://grafana.blind-date.com
#      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    restart: unless-stopped
    networks:
      - app-net

  user-server-1:
    build:
      context: .
      dockerfile: user-server/Dockerfile
#    image: eclipse-temurin:17-jre-alpine
    container_name: user-server-1
    restart: unless-stopped
#    command: [ "java","-jar","/app/user-server.jar" ]
    depends_on:
      mysql-user:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8081"
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EXTERNAL_CHAT_SERVER_URL: ${CHAT_SERVER_DOMAIN}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET_USER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8081/api/v1/users/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    volumes:
      - ./logs/user-server-1:/app/logs
#      - ./user-server/build/libs/user-server-0.0.1-SNAPSHOT.jar:/app/user-server.jar
    networks:
      - app-net

