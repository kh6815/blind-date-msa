  #  복구 시나리오:
  #  - 노드 재시작 → AOF로 최근 데이터 복구 (최대 1초 유실)
  #  - AOF 손상 시 → RDB 스냅샷으로 fallback
  #  - 클러스터 노드 장애 → replica가 master로 자동 승격
